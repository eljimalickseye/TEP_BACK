version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: teptep_api_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - codebase:/var/www
      - sqlite_db:/var/www/database
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync

  web:
    image: nginx:alpine
    container_name: teptep_api_web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - codebase:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  codebase:
  sqlite_db:
